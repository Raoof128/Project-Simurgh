name: stage-4-lean-proofs
on:
  push:
    paths: ["proofs/**"]
  pull_request:
    paths: ["proofs/**"]
jobs:
  lean-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan (pinned toolchain from proofs/stage4m/lean-toolchain)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain "$(cat proofs/stage4m/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Type-check the Stage 4 formal core (exit lattice, structuring, anti-monotonicity)
        run: |
          lean proofs/stage4/ExitLattice.lean
          lean proofs/stage4/Structuring.lean
          lean proofs/stage4m/AntiMonotonicity.lean
          lean proofs/stage4n/TemporalCompleteness.lean
          lean proofs/stage4o/MonotoneConsent.lean
          lean proofs/stage4p/OriginCustody.lean
          lean proofs/stage4q/FrictionPrecedence.lean
          lean proofs/stage4r/NoPublicHerdToken.lean
          lean proofs/stage4s/NoGhostHop.lean
          lean proofs/stage4u/NoSilentBypass.lean
