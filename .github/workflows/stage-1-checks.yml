name: Simurgh Quality Gate

on:
  push:
    branches:
      - main
      - stage-1-academic-shield
      - stage-2-integrity-node
      - stage-*
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

# Allow only one concurrent run per branch — newer pushes cancel older runs.
concurrency:
  group: simurgh-quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-1-checks:
    name: Run Simurgh quality gate (scripts/check.sh)
    runs-on: ubuntu-latest
    # 20 min headroom: first push has cold Cargo cache (~3–5 min for x11rb/zbus/axum build).
    # Subsequent pushes hit the actions/cache@v4 key on Cargo.lock and run in <2 min.
    timeout-minutes: 20

    # Safe non-real values used purely so the server can start in the smoke
    # test step. ANTHROPIC_API_KEY is intentionally NOT set — the smoke test
    # path forces SIMURGH_DEMO_MODE=1 inside scripts/check.sh anyway.
    env:
      NODE_ENV: test
      SIMURGH_ALLOWED_ORIGIN: http://localhost:33030
      SIMURGH_INSTRUCTOR_TOKEN: test-instructor-token
      SIMURGH_HELPER_SECRET: test-helper-secret
      SIMURGH_AUDIT_SECRET: test-audit-secret
      SIMURGH_SESSION_SIGNING_SECRET: test-session-secret
      SIMURGH_SCORING_MODE: local
      SIMURGH_CLAUDE_ON_SAFE: "false"
      SIMURGH_CLAUDE_ON_WARNING: "false"
      SIMURGH_CLAUDE_ON_CRITICAL: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the policy-drift guards can resolve a real base ref
          # (origin/main / merge-commit parent) and verify "zero src/llmShield
          # change" for real. With fetch-depth:1 only the merge commit is present,
          # so no base resolves: the lenient guards degrade to warn-pass and the
          # fail-closed Stage 3S guard breaks the build. Full history fixes both.
          fetch-depth: 0

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Install Python test dependencies
        run: python3 -m pip install "pytest>=8.0"

      - name: Install Linux daemon test dependencies (xvfb, dbus, shellcheck)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb x11-utils dbus-x11 xterm shellcheck

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/simurgh-daemon-linux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tools/simurgh-daemon-linux/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Shellcheck Linux daemon lifecycle scripts
        run: shellcheck tools/simurgh-daemon-linux/scripts/*.sh

      - name: Rust fmt (Linux daemon)
        run: cargo fmt --check --manifest-path tools/simurgh-daemon-linux/Cargo.toml

      - name: Rust clippy (Linux daemon)
        run: cargo clippy --manifest-path tools/simurgh-daemon-linux/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests (Linux daemon) — Xvfb mandatory
        env:
          SIMURGH_REQUIRE_XVFB_TESTS: "1"
        # --test-threads=1: DISPLAY is process-global; serial execution prevents
        # mutex poisoning if one Xvfb display takes >500 ms to bind on cold CI.
        run: cargo test --manifest-path tools/simurgh-daemon-linux/Cargo.toml -- --test-threads=1

      # The smoke/audit servers bind fixed ports in the 33000-33999 band, which sits
      # inside Linux's default ephemeral range (32768-60999). Without this, an outbound
      # curl/fetch in an earlier step can grab e.g. 33170 as a transient source port, and
      # a later server's listen() on that port then fails with "EADDRINUSE / port already
      # in use" — an intermittent, port-roulette flake that worsens as the run progresses.
      # Reserving the band keeps the kernel from ever auto-allocating these ports.
      - name: Reserve smoke-server ports from the ephemeral range
        run: sudo sysctl -w net.ipv4.ip_local_reserved_ports=33000-33999

      - name: Run Stage 1 check suite
        run: ./scripts/check.sh

      - name: Set up Node.js 26 (byte-stable E2E reproduce)
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install Lean (elan) so the Stage 4R reproduce builds its proof
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain "$(cat proofs/stage4m/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Run E2E gate (scripts/check-e2e.sh)
        run: ./scripts/check-e2e.sh

      - name: Upload check logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: simurgh-check-logs
          path: .simurgh_check_logs/
          if-no-files-found: ignore
          retention-days: 7
