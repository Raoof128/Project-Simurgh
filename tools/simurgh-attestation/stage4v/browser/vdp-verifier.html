    <h1>VDP — Verifiable Due Process (counter-capsule contest)</h1>
    <p class="banner">
      Convenience view — the Node CLI verifier is authoritative. This page recomputes the
      public-tier conflict map offline (no network; CSP <code>default-src 'none'</code>).
    </p>

    <!-- prettier-ignore -->

        const ABSENCE = { not_derivable: 1, requires_human_input: 1 };
        const RAW_CONTENT_KEYS = { judgment_text:1, raw_prose:1, provider_notes:1, operator_summary:1, prompt:1, transcript:1, note:1, text:1, body:1 };
        const TOP_LEVEL_KEYS = { schema:1, respondent_role:1, binding:1, contests:1, anchor_contest:1, filed_at_beat:1, respondent_census:1, respondent_evidence_artifacts:1, non_claims:1, respondent_key_digest:1, signature:1 };
        const RECOMPUTE_CONTEST_KEYS = { regime:1, section_id:1, verb:1, claimed_value:1, recompute_kind:1, evidence_digest:1 };
        const JUDGMENT_CONTEST_KEYS = { regime:1, section_id:1, verb:1, judgment_text_digest:1 };

        const ROLES = { provider:1, deployer:1, third_party:1, unspecified:1 };

        function ROOT_PARTITIONS() {
          return {
            gpai_art55: { incident_dates:"evidence_backed", resulting_harm:"requires_human_input", chain_of_events:"evidence_backed", model_involved:"requires_human_input", evidence_available:"not_derivable", serious_incident_response:"evidence_backed", recommendation:"requires_human_input", root_cause_analysis:"requires_human_input", post_market_monitoring_patterns:"not_derivable", submitter_information:"requires_human_input" },
            art73_high_risk_draft: { admin_authority:"requires_human_input", report_dates_classification:"evidence_backed", submitter_information:"requires_human_input", system_categorisation:"requires_human_input", system_description:"requires_human_input", incident_nature:"requires_human_input", users_affected:"evidence_backed", remedial_actions:"evidence_backed", initial_reporter:"requires_human_input", provider_preliminary_comments:"requires_human_input", cause_investigation:"requires_human_input", general_comments:"not_derivable" },
          };
        }
        const recompute = (kind, a) => {
          if (kind === "epoch_range") return a.range;
          if (kind === "participant_count") return (a.participants || []).length;
          if (kind === "kernel_block_record") return (a.decisions || []).filter((d) => d.decision === "blocked").length;
          if (kind === "stage4s_chain_verdict") return a.recorded_verdict;
          if (kind === "consent_manifest_scope") return a.scope;
          if (kind === "stage4u_asr") return a.attack_success_rate;
          if (kind === "stage4n_beat_index") return a.beat_index;
          return undefined;
        };
        const eq = (a, b) => canonicalJson(a) === canonicalJson(b);
        const artIndex = (cc) => Object.fromEntries((cc.respondent_evidence_artifacts || []).map((a) => [recordDigest(a), a]));
        const tuples = (cc) => [
          ...(cc.contests || []).map((c) => ({ regime: c.regime, section_id: c.section_id })),
          ...(cc.anchor_contest ? [{ regime: "meta", section_id: "evidence_anchored_at_beat" }] : []),
        ];
        const keyString = (t) => t.regime + "/" + t.section_id;
        const sortKey = (t) => JSON.stringify([t.regime, t.section_id]);

        function deriveSectionStatus(contest, cls, operatorValue, artifacts) {
          if (cls === undefined) return { status: "DISPUTE_FAILED", subreason: "section_not_contestable" };
          if (contest.verb === "dispute_as_judgment") return { status: "DISPUTE_RECORDED" };
          if (contest.verb === "agree" && ABSENCE[cls]) return { status: "DISPUTE_FAILED", subreason: "section_not_contestable" };
          const artifact = artifacts[contest.evidence_digest];
          const expectedKind = KIND_EVIDENCE_SOURCE[contest.recompute_kind];
          const kindOk = artifact !== undefined && expectedKind !== undefined && artifact.kind === expectedKind;
          if (!kindOk) return { status: "DISPUTE_FAILED", subreason: "recompute_failed" };

          if (contest.verb === "agree") return eq(recomputed, operatorValue) ? { status: "AGREED", respondent_value: recomputed } : { status: "DISPUTE_FAILED", subreason: "recompute_failed" };

            const s = deriveSectionStatus(cc.anchor_contest, "evidence_backed", (capsule.evidence_anchored_at_beat || {}).value, artifacts);
            anchor_status = Object.assign({ key: "meta/evidence_anchored_at_beat" }, s);
          }

          for (const t of tuples(cc)) contested[keyString(t)] = 1;

        }
        function contestShapeError(c) {

          const allowed = c.verb === "dispute_as_judgment" ? JUDGMENT_CONTEST_KEYS : RECOMPUTE_CONTEST_KEYS;
          for (const k of Object.keys(c)) { if (RAW_CONTENT_KEYS[k]) continue; if (!allowed[k]) return 151; }
          if (c.verb !== "dispute_as_judgment") { if (c.claimed_value === undefined || typeof c.recompute_kind !== "string" || !DIGEST_RE.test(c.evidence_digest || "")) return 151; }

        }
        function schemaCheck(cc) {
          if (!cc || typeof cc !== "object" || cc.schema !== "simurgh.vdp.counter_capsule.v1") return 151;
          for (const k of Object.keys(cc)) { if (RAW_CONTENT_KEYS[k]) continue; if (!TOP_LEVEL_KEYS[k]) return 151; }

    <label for="capsuleIn">Incident capsule bundle (JSON)</label>
    <textarea id="capsuleIn"></textarea>
    <label for="ccIn">Counter-capsule (JSON)</label>
    <textarea id="ccIn"></textarea>
    <label for="pubIn">Capsule public key (PEM)</label>
    <textarea id="pubIn"></textarea>
    <p><button id="run">Derive outcome</button></p>
    <pre id="out">(paste inputs and press Derive)</pre>

    <script>
      document.getElementById("run").addEventListener("click", function () {
        const out = document.getElementById("out");
        try {
          const capsule = JSON.parse(document.getElementById("capsuleIn").value);
          const cc = JSON.parse(document.getElementById("ccIn").value);
          const pub = document.getElementById("pubIn").value;
          const res = globalThis.VDP.evaluateContestPublic(capsule, cc, pub);
          const lines = ["raw = " + res.raw];
          if (res.envelope.result && res.envelope.result.sections)
            for (const s of res.envelope.result.sections)
              lines.push(s.key + " -> " + s.status + (s.subreason ? " (" + s.subreason + ")" : ""));
          if (res.envelope.result && res.envelope.result.anchor_status)
            lines.push("anchor -> " + res.envelope.result.anchor_status.status);
          out.textContent = lines.join("\n");
        } catch (e) {
          out.textContent = "error: " + e.message;
        }
      });
    </script>
