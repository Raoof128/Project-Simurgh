<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banking Shield Scenario</title>
    <style>
      :root {
        --ink: #18211f;
        --muted: #52605c;
        --line: #d9e1dd;
        --panel: #f7faf8;
        --accent: #0c6b58;
        --danger: #8b2f2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--ink);
        background: #ffffff;
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.9rem, 4vw, 3rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        margin-top: 24px;
      }

      button,
      a.button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: var(--accent);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary {
        background: #33413d;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      output,
      pre {
        display: block;
        min-height: 44px;
        margin-top: 16px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--muted);
        overflow: auto;
        white-space: pre-wrap;
      }

      .error {
        border-color: #d7a9a9;
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Mock Bank Synthetic Scenarios</h1>
        <p>
          Each button submits one fixed metadata-only JSON body for the current Phase A session.
        </p>
      </header>

      <section class="grid" aria-label="Synthetic scenario actions">
        <button type="button" data-scenario="mock_cdr_consent">Mock CDR Consent</button>
        <button type="button" data-scenario="mock_confirmation_of_payee">
          Example Payee Check
        </button>
        <button type="button" data-scenario="remote_access_warning">Remote Access Warning</button>
        <button type="button" data-scenario="mock_payment_pause">Payment Pause</button>
        <button type="button" data-scenario="mock_ai_agent_finance_action">
          Synthetic Finance Agent
        </button>
        <button class="secondary" type="button" id="withdraw">Withdraw</button>
      </section>

      <output id="status" aria-live="polite"></output>
      <pre id="response" aria-label="API response"></pre>
      <p><a class="button" href="/banking-pilot-report.html">Open Report</a></p>
    </main>

    <script>
      const VALID_SCOPE_HASH =
        "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855";

      const status = document.querySelector("#status");
      const response = document.querySelector("#response");
      const sessionId = sessionStorage.getItem("bankingPilotSessionId");
      const token = sessionStorage.getItem("bankingPilotToken");

      function payloadFor(scenario) {
        if (scenario === "mock_cdr_consent") {
          return {
            banking_session_id: sessionId,
            scenario_type: scenario,
            submit_intent: true,
            consent_scope_hash: VALID_SCOPE_HASH,
            consent_duration_category: "one_time",
            withdrawal_option_shown: true,
          };
        }
        if (scenario === "mock_confirmation_of_payee") {
          return {
            banking_session_id: sessionId,
            scenario_type: scenario,
            mock_cop_result_category: "close_match",
            risk_prompt_shown: true,
            user_action: "pause",
          };
        }
        if (scenario === "remote_access_warning") {
          return {
            banking_session_id: sessionId,
            scenario_type: scenario,
            user_selected_context: "caller_requested_remote_access",
            risk_prompt_shown: true,
            user_action: "request_review",
          };
        }
        if (scenario === "mock_payment_pause") {
          return {
            banking_session_id: sessionId,
            scenario_type: scenario,
            risk_prompt_shown: true,
            user_action: "pause",
          };
        }
        return {
          banking_session_id: sessionId,
          scenario_type: "mock_ai_agent_finance_action",
          agent_action_type: "payment_draft",
          user_decision: "reject",
          financial_payload_recorded_by_simurgh: false,
        };
      }

      async function post(path, body) {
        const res = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify(body),
        });
        return { ok: res.ok, status: res.status, body: await res.json() };
      }

      async function submitScenario(scenario) {
        status.className = "";
        status.textContent = `Submitting ${scenario}...`;
        const result = await post("/api/banking-pilot/submit", payloadFor(scenario));
        response.textContent = JSON.stringify(result.body, null, 2);
        status.className = result.ok ? "" : "error";
        status.textContent = result.ok ? "Submitted." : `Rejected with ${result.status}.`;
      }

      if (!sessionId || !token) {
        status.className = "error";
        status.textContent = "No synthetic session found.";
      }

      document.querySelectorAll("[data-scenario]").forEach((button) => {
        button.addEventListener("click", () => submitScenario(button.dataset.scenario));
      });

      document.querySelector("#withdraw").addEventListener("click", async () => {
        const result = await post("/api/banking-pilot/withdraw", {});
        response.textContent = JSON.stringify(result.body, null, 2);
        status.className = result.ok ? "" : "error";
        status.textContent = result.ok ? "Withdrawn." : `Rejected with ${result.status}.`;
      });
    </script>
  </body>
</html>
